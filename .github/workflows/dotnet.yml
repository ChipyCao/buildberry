name: .NET CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Restore (solution)
        run: dotnet restore

      - name: Diagnostic: dotnet info
        run: dotnet --info

      - name: Build API project (disable GenerateAssemblyInfo to avoid duplicate attributes)
        run: dotnet build Buildberry.csproj /p:GenerateAssemblyInfo=false --no-restore --configuration Release --verbosity minimal

      - name: Build tests project
        run: dotnet build tests/Buildberry.Tests/Buildberry.Tests.csproj --no-restore --configuration Release --verbosity minimal

      - name: Test (explicit project)
        run: dotnet test tests/Buildberry.Tests/Buildberry.Tests.csproj --no-build --verbosity normal
